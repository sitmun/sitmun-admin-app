name: CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Unit tests
      run: npm run test -- --watch=false --coverage
    
    - name: Sonar Cloud Scan
      uses: sonarsource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{secrets.TOKEN_FOR_WORKFLOWS}}
        SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
    
    - name: E2E tests
      run: ./scripts/conditional-e2e.sh
      shell: bash
      continue-on-error: true
    
    - name: Build for deployment
      run: npm run build -- --configuration=testdeployment --baseHref="https://sitmun.github.io/admin-app/"
    
    - name: Validate build artifacts
      run: |
        if [ ! -d "dist/admin-app" ]; then
          echo "ERROR: Build artifacts not found"
          exit 1
        fi
        if [ -z "$(ls -A dist/admin-app)" ]; then
          echo "ERROR: Build directory is empty"
          exit 1
        fi
        echo "✓ Build artifacts validated"
    
    - name: Deploy to GitHub pages
      env:
        USERNAME: ${{secrets.USERNAME_FOR_WORKFLOWS}}
        GITHUB_API_KEY: ${{secrets.TOKEN_FOR_WORKFLOWS}}
        GITHUB_WORKSPACE: ${{github.workspace}}
        CI: true
      run: ./scripts/deploy.sh
      shell: bash
