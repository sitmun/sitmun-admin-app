<app-form-toolbar
  entityType="{{ config.labelSingular }}"
  font="{{ config.font }}"
  icon="{{ config.icon }}"
  [itemName]="itemName('name')"
  [isNew]="isNewOrDuplicated()"
  [canSave]="canSaveEntity"
  [form]="entityForm"
  entityLabelPrefix="entity.configurationParameter"
  [dataLoaded]="dataLoaded"
  (save)="onSaveButtonClicked()"
  (back)="utils.navigateBack()">
</app-form-toolbar>

<mat-tab-group
  mat-stretch-tabs="false"
  mat-align-tabs="end"
  [dynamicHeight]="true"
  preserveContent="true"
>
  <mat-tab label="{{ 'common.form.details' | translate }}">
    <form [formGroup]="entityForm" *ngIf="dataLoaded">
      <mat-card class="sitmun-mat-card-margin" appearance="outlined">
        <mat-card-content>
          <mat-form-field appearance="outline" class="full">
            <mat-label>{{ 'common.form.name' | translate }}</mat-label>
            <input matInput type="text" formControlName="name" [maxlength]="250" required>
            <mat-hint align="end">{{entityForm.get('name') | characterCount}}</mat-hint>
            <mat-error *ngIf="entityForm.get('name')?.hasError('required') && entityForm.get('name')?.touched">
              {{ 'common.error.required' | translate }}
            </mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="full">
            <mat-label>{{ 'common.form.value' | translate }}</mat-label>
            <textarea matInput type="text" formControlName="value" [maxlength]="4000"></textarea>
            <mat-hint align="end">{{entityForm.get('value') | characterCount}}</mat-hint>
          </mat-form-field>
        </mat-card-content>
      </mat-card>
    </form>
  </mat-tab>
</mat-tab-group>
