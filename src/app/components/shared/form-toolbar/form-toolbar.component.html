<mat-toolbar>
  <h4>
    <span class="spacer">
      <mat-icon aria-hidden="true" fontSet="{{ font }}">{{ icon }}</mat-icon>
      {{ isNew ? (entityType | translate) + ' (' + ('new' | translate) + ')' : itemName }}
      <ng-container *ngIf="additionalText"> - {{ additionalText }}</ng-container>
    </span>
  </h4>
  <span class="spacer"></span>
  <app-form-validation-banner
    *ngIf="showValidationBanner && dataLoaded"
    [form]="form"
    [entityType]="validationEntityType"
    [fieldLabelKeys]="validationFieldLabelKeys"
    class="toolbar-banner">
  </app-form-validation-banner>
  <div *ngIf="customWarningMessage && dataLoaded" class="toolbar-banner custom-warning-wrapper">
    <mat-card
      appearance="outlined"
      role="alert"
      aria-live="polite"
      class="form-validation-banner custom-warning-banner">
      <mat-card-content>
        <div class="banner-content">
          <mat-icon class="banner-icon">info</mat-icon>
          <div class="banner-text">
            <span class="banner-message">{{ customWarningMessage }}</span>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
  <button
    [matTooltip]="'save' | translate"
    mat-mini-fab
    class="add-half-gap"
    [disabled]="!canSave"
    (click)="save.emit()"
    color="primary">
    <mat-icon fontSet="material-icons-round">save</mat-icon>
  </button>
  <button
    [matTooltip]="'return' | translate"
    mat-mini-fab
    class="add-half-gap"
    (click)="back.emit()"
    color="primary">
    <mat-icon fontSet="material-icons-round">arrow_back</mat-icon>
  </button>
</mat-toolbar>
