<div #previewContainer class="preview-container" [hidden]="!isVisible || !imageSource">
  <img #previewImage [id]="previewId" alt="preview" class="previewImage" [style.max-width.px]="maxWidth" [style.max-height.px]="maxHeight">
  <div class="image-dimensions" *ngIf="imageSource && originalImageWidth && originalImageHeight">
    {{ 'entity.tree.originalSize' | translate }}: {{ originalImageWidth }}x{{ originalImageHeight }}px
  </div>
  <button *ngIf="imageSource && showDownload" 
          (click)="downloadImage()"
          class="download-link"
          mat-button
          color="primary">
    <mat-icon>download</mat-icon>
    {{ 'entity.tree.downloadImage' | translate }}
  </button>
</div>
