<h2 class="titleDialog" mat-dialog-title>{{ title | translate }}</h2>
<mat-dialog-content>
  <mat-card *ngIf="getAllsTable.length === 1" appearance="outlined">
    <div *ngFor="let getAll of getAllsTable; let i = index">
      <mat-card-content>
        <app-data-grid
          (getSelectedRows)='joinRowsReceived($event)'
          [addFieldRestriction]='getAddFieldRestriction(i)'
          [changeHeightButton]='changeHeightButton'
          [columnDefs]="columnDefsTable[i]"
          [currentData]='getCurrentData(i)'
          [defaultColumnSorting]='getOrderTable(i) ? [getOrderTable(i)] : null'
          [defaultHeight]='heightByDefault'
          [eventGetSelectedRowsSubscription]="getAllRows.asObservable()"
          [fieldRestrictionWithDifferentName]='getFieldRestrictionWithDifferentName(i)'
          [getAll]='getAll'
          [globalSearch]=true
          [hideDuplicateButton]=true
          [hideReplaceButton]=true
          [nonEditable]='nonEditable'
          [singleSelection]="singleSelectionTable[i]"
          [title]="titlesTable[i]"
        >
        </app-data-grid>
      </mat-card-content>
    </div>
  </mat-card>
  <mat-tab-group *ngIf="getAllsTable.length>1">
    <mat-tab
      *ngFor="let getAll of getAllsTable; let i = index"
      [label]="(titlesTable[i] | translate) || ''">
      <mat-card appearance="outlined">
        <mat-card-content>
          <app-data-grid
            [columnDefs]="columnDefsTable[i]"
            [changeHeightButton]='changeHeightButton'
            [defaultHeight]='heightByDefault'
            [getAll]='getAll'
            [globalSearch]=true
            [singleSelection]="singleSelectionTable[i]"
            [title]="titlesTable[i]"
            [defaultColumnSorting]='getOrderTable(i) ? [getOrderTable(i)] : null'
            [nonEditable]='nonEditable'
            [eventGetSelectedRowsSubscription]="getAllRows.asObservable()"
            [addFieldRestriction]='getAddFieldRestriction(i)'
            [currentData]='getCurrentData(i)'
            [hideReplaceButton]=true
            [hideDuplicateButton]=true
            [fieldRestrictionWithDifferentName]='getFieldRestrictionWithDifferentName(i)'
            (getSelectedRows)='joinRowsReceived($event)'
          >
          </app-data-grid>
        </mat-card-content>
      </mat-card>
    </mat-tab>
  </mat-tab-group>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    mat-raised-button
    color="warn"
    mat-dialog-close
    (click)="closeDialog()">
    <mat-icon fontSet="material-icons-round">close</mat-icon>
    {{ 'cancel' | translate }}
  </button>
  <button
    mat-raised-button
    [mat-dialog-close]="true"
    color="primary"
    (click)="getAllSelectedRows()">
    <mat-icon fontSet="material-icons-round">add</mat-icon>
    {{ 'add' | translate }}
  </button>
</mat-dialog-actions>
