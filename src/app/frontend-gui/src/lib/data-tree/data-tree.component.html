<mat-card appearance="outlined" class="tree-card">
  <mat-card-content class="tree-card-content">
    <mat-toolbar>
      <button type="button"
              matTooltip="{{ 'expandAll' | translate }}"
              mat-mini-fab class="add-half-gap"
              color="primary"
              (click)="expandAll()">
        <mat-icon fontSet="material-icons-round">unfold_more</mat-icon>
      </button>
      <button type="button"
              matTooltip="{{ 'collapseAll' | translate }}"
              mat-mini-fab class="add-half-gap"
              color="primary"
              (click)="collapseToFirstLevel()">
        <mat-icon fontSet="material-icons-round">unfold_less</mat-icon>
      </button>
      <mat-form-field subscriptSizing="dynamic" class="add-half-gap tree-search-field">
        <mat-label>{{ 'common.button.search' | translate }}</mat-label>
        <input matInput type="text" placeholder="" (keyup)="onFilterKeyup($event)" [value]="filterValue">
      </mat-form-field>
      <button type="button"
              *ngFor="let nodeType of getAllowedRootTypes()"
              [matTooltip]="getNodeTypeLabel(nodeType)"
              mat-mini-fab class="add-half-gap"
              color="primary"
              (click)="addRootNode(nodeType)">
        <mat-icon [fontSet]="getNodeIconFontForType(nodeType) || 'material-icons-round'">{{ getNodeIconForType(nodeType) }}</mat-icon>
      </button>
      <button type="button"
              matTooltip="{{ 'loadGroupLayers' | translate }}"
              mat-mini-fab class="add-half-gap"
              color="primary"
              *ngIf="loadDataButton"
              (click)="loadDataButtonClicked()">
        <mat-icon fontSet="material-icons-round">settings</mat-icon>
      </button>
    </mat-toolbar>

    <div class="tree-wrapper">
    <mat-tree [dataSource]="dataSource" [treeControl]="treeControl">
      <mat-tree-node *matTreeNodeDef="let node" matTreeNodeToggle draggable="true"
        (dragstart)="handleDragStart($event, node);" (dragover)="handleDragOver($event, node);"
        (dragend)="handleDragEnd($event);" (drop)="handleDrop($event, node);"
        [ngClass]="{'drop-above': dragNodeExpandOverArea === 'above' && dragNodeExpandOverNode === node,
        'drop-below': dragNodeExpandOverArea === 'below' && dragNodeExpandOverNode === node,
        'drop-center': dragNodeExpandOverArea === 'center' && dragNodeExpandOverNode === node,
        'deletedNode': node.status==='pendingDelete',
        'modified-node': node.status==='Modified',
        'pending-creation-node': node.status==='pendingCreation',
        'selected': selectedNodeId === node.id,
        'root-descendant': isRootDescendant(node)}"
        [class.root-node-hidden]="isRootNode(node)"
        [style.padding-left]="getAdjustedPadding(node)"
        class="tree-node-row">
        <button mat-icon-button disabled aria-hidden="true">
          <mat-icon style="display: none;"></mat-icon>
        </button>
        <mat-icon *ngIf="node.name !== ''" [attr.aria-label]="(node.nodeType || node.type) + ' icon'"
                  class="type-icon" [fontSet]="getNodeIconFont(node)" [style.color]="node.status === 'pendingDelete' ? '#d32f2f' : null">
          {{ getNodeIcon(node) }}
        </mat-icon>
        <mat-icon *ngIf="(node.status==='Modified' || node.status==='pendingCreation') && node.name !== '' && node.status !== 'pendingDelete'" 
                  class="status-indicator-icon">
          {{node.status === 'Modified' ? 'edit' : 'add_circle'}}
        </mat-icon>
        <span class="node-name" (click)="onButtonClicked(node.id, 'edit')" (keyup.enter)="onButtonClicked(node.id, 'edit')" tabindex="0" role="button" [attr.aria-label]="('common.edit' | translate) + ': ' + node.name" *ngIf="node.id !== undefined && node.status!=='pendingDelete'">{{node.name}}</span>
        <span class="node-name" *ngIf="node.id === undefined || node.status==='pendingDelete'">{{node.name}}</span>

        <div class="node-actions">
          <ng-container *ngIf="node.status!=='pendingDelete' && (!canNodeHaveChildren || canNodeHaveChildren(node.nodeType))">
            <button *ngFor="let nodeType of getAllowedChildTypes(getNestedNode(node))"
                    (click)="onAddChildNode(getNestedNode(node), nodeType)"
                    mat-icon-button
                    [matTooltip]="getNodeTypeLabel(nodeType)"
                    [attr.aria-label]="getNodeTypeLabel(nodeType)">
              <mat-icon [fontSet]="getNodeIconFontForType(nodeType)">{{ getNodeIconForType(nodeType) }}</mat-icon>
            </button>
          </ng-container>
          <button (click)="onButtonClicked(node.id, 'delete')"
                  *ngIf="node.id !== undefined && node.status!=='pendingDelete'"
                  mat-icon-button 
                  [matTooltip]="'common.delete' | translate"
                  [attr.aria-label]="'common.delete' | translate">
            <mat-icon>delete</mat-icon>
          </button>
          <button (click)="onButtonClicked(node.id, 'restore')" 
                  *ngIf="node.id !== undefined && node.status==='pendingDelete'"
                  mat-icon-button 
                  [matTooltip]="'common.restore' | translate"
                  [attr.aria-label]="'common.restore' | translate">
            <mat-icon>undo</mat-icon>
          </button>
          <button (click)="onButtonClicked(node.id, 'revert')" 
                  *ngIf="node.id !== undefined && node.id >= 0 && node.status==='Modified'"
                  mat-icon-button 
                  [matTooltip]="'common.revert' | translate"
                  [attr.aria-label]="'common.revert' | translate">
            <mat-icon>restore</mat-icon>
          </button>
          <button (click)="onButtonClicked(node.id, 'remove')" 
                  *ngIf="node.id !== undefined && node.status==='pendingCreation'"
                  mat-icon-button 
                  [matTooltip]="'common.remove' | translate"
                  [attr.aria-label]="'common.remove' | translate">
            <mat-icon>cancel</mat-icon>
          </button>
        </div>
      </mat-tree-node>

      <mat-tree-node *matTreeNodeDef="let node;when: hasChild" draggable="true"
        (dragstart)="handleDragStart($event, node);" (dragover)="handleDragOver($event, node);"
        (dragend)="handleDragEnd($event);" (drop)="handleDrop($event, node);"
        [ngClass]="{'drop-above': dragNodeExpandOverArea === 'above' && dragNodeExpandOverNode === node,
        'drop-below': dragNodeExpandOverArea === 'below' && dragNodeExpandOverNode === node,
        'drop-center': dragNodeExpandOverArea === 'center' && dragNodeExpandOverNode === node,
        'deletedNode': node.status==='pendingDelete',
        'modified-node': node.status==='Modified',
        'pending-creation-node': node.status==='pendingCreation',
        'selected': selectedNodeId === node.id,
        'root-descendant': isRootDescendant(node)}"
        [class.root-node-hidden]="isRootNode(node)"
        [style.padding-left]="getAdjustedPadding(node)"
        class="tree-node-row">
        <button mat-icon-button matTreeNodeToggle (click)="expansionModel.toggle(node.id)"
          [matTooltip]="(treeControl.isExpanded(node) ? ('collapseAll' | translate) : ('expandAll' | translate))"
          [attr.aria-label]="'toggle ' + node.name">
          <mat-icon class="mat-icon-rtl-mirror">
            {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
          </mat-icon>
        </button>
        <mat-icon *ngIf="node.name !== ''" class="type-icon" [attr.aria-label]="(node.nodeType || node.type) + ' icon'"
                  [fontSet]="getNodeIconFont(node)" [style.color]="node.status === 'pendingDelete' ? '#d32f2f' : null">
          {{ getNodeIcon(node) }}
        </mat-icon>
        <mat-icon *ngIf="(node.status==='Modified' || node.status==='pendingCreation') && node.name !== '' && node.status !== 'pendingDelete'" 
                  class="status-indicator-icon">
          {{node.status === 'Modified' ? 'edit' : 'add_circle'}}
        </mat-icon>
        <span class="node-name" (click)="onButtonClicked(node.id, 'edit')" (keyup.enter)="onButtonClicked(node.id, 'edit')" tabindex="0" role="button" [attr.aria-label]="('common.edit' | translate) + ': ' + node.name" *ngIf="node.id !== undefined && node.id !== null && node.status!=='pendingDelete'">{{node.name}}</span>
        <span class="node-name" *ngIf="node.id === undefined || node.id === null || node.status==='pendingDelete'">{{node.name}}</span>
        <div class="node-actions">
          <ng-container *ngIf="node.status!=='pendingDelete' && (!canNodeHaveChildren || canNodeHaveChildren(node.nodeType))">
            <button *ngFor="let nodeType of getAllowedChildTypes(getNestedNode(node))"
                    (click)="onAddChildNode(getNestedNode(node), nodeType)"
                    mat-icon-button
                    [matTooltip]="getNodeTypeLabel(nodeType)"
                    [attr.aria-label]="getNodeTypeLabel(nodeType)">
              <mat-icon [fontSet]="getNodeIconFontForType(nodeType)">{{ getNodeIconForType(nodeType) }}</mat-icon>
            </button>
          </ng-container>
          <button (click)="onButtonClicked(node.id, 'delete')"
                  *ngIf="node.id !== undefined && node.id !== null && node.status!=='pendingDelete'"
                  mat-icon-button 
                  [matTooltip]="'common.delete' | translate"
                  [attr.aria-label]="'common.delete' | translate">
            <mat-icon>delete</mat-icon>
          </button>
          <button (click)="onButtonClicked(node.id, 'restore')" 
                  *ngIf="node.id !== undefined && node.id !== null && node.status==='pendingDelete'"
                  mat-icon-button 
                  [matTooltip]="'common.restore' | translate"
                  [attr.aria-label]="'common.restore' | translate">
            <mat-icon>undo</mat-icon>
          </button>
          <button (click)="onButtonClicked(node.id, 'revert')" 
                  *ngIf="node.id !== undefined && node.id !== null && node.id >= 0 && node.status==='Modified'"
                  mat-icon-button 
                  [matTooltip]="'common.revert' | translate"
                  [attr.aria-label]="'common.revert' | translate">
            <mat-icon>restore</mat-icon>
          </button>
          <button (click)="onButtonClicked(node.id, 'remove')" 
                  *ngIf="node.id !== undefined && node.id !== null && node.status==='pendingCreation'"
                  mat-icon-button 
                  [matTooltip]="'common.remove' | translate"
                  [attr.aria-label]="'common.remove' | translate">
            <mat-icon>cancel</mat-icon>
          </button>
        </div>
      </mat-tree-node>
    </mat-tree>
    </div>
  </mat-card-content>
</mat-card>

<span #emptyItem></span>
