<mat-tree [dataSource]="dataSource" [treeControl]="treeControl">
	<mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding tabindex="0">
	  <span (click)="onNodeClick(node)" (keyup.enter)="onNodeClick(node)" tabindex="0" role="button" style="cursor: pointer;">{{ node.name }}</span>
	</mat-tree-node>
	<!-- This is the tree node template for expandable nodes -->
	<mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding tabindex="0">
	  <span (click)="onNodeClick(node)" (keyup.enter)="onNodeClick(node)" tabindex="0" role="button" style="cursor: pointer;">{{ node.name }}</span>
	</mat-tree-node>
  </mat-tree>

<span #emptyItem></span>
